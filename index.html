<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which AC System Is Right for Your Home? — Snohomish County Guide</title>
<meta name="description" content="Not sure which AC system you need? Answer 6 quick questions and get a personalized recommendation for your Snohomish County home — free, instant, no obligation.">
<meta name="keywords" content="home cooling options Snohomish County, which AC system is right for my home, ductless vs central air Mill Creek, mini split vs central AC, add air conditioning older home, best AC system Bothell">
<link rel="canonical" href="https://selector.millcreek-hvac.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<script async src="https://www.googletagmanager.com/gtag/js?id=AW-17039190320"></script>


<script>
const state={homeType:null,homeTypeLabel:null,zones:null,zonesLabel:null,stories:null,storiesLabel:null,cooling:null,coolingLabel:null,size:null,sizeLabel:null,ducts:null,ductsLabel:null,city:null};
const WEBHOOK="https://hook.us2.make.com/hmenfw6iwamhalxej725wzldgy201c1m";

const pricing={
  "ductless-single":{u1500:{range:"$4,000 – $6,500",net:"$2,000 – $4,500",credit:true},"1500-2500":{range:"$5,500 – $8,500",net:"$3,500 – $6,500",credit:true},"2500-3500":{range:"$7,000 – $10,000",net:"$5,000 – $8,000",credit:true},o3500:{range:"$8,500 – $12,000",net:"$6,500 – $10,000",credit:true}},
  "ductless-multi":{u1500:{range:"$7,500 – $11,000",net:"$5,500 – $9,000",credit:true},"1500-2500":{range:"$9,000 – $14,000",net:"$7,000 – $12,000",credit:true},"2500-3500":{range:"$12,000 – $17,000",net:"$10,000 – $15,000",credit:true},o3500:{range:"$17,000 – $24,000",net:"$15,000 – $22,000",credit:true}},
  "ducted-heat-pump":{u1500:{range:"$7,000 – $10,500",net:"$5,000 – $8,500",credit:true},"1500-2500":{range:"$9,000 – $13,500",net:"$7,000 – $11,500",credit:true},"2500-3500":{range:"$12,000 – $17,500",net:"$10,000 – $15,500",credit:true},o3500:{range:"$16,000 – $23,000",net:"$14,000 – $21,000",credit:true}},
  "central-ac":{u1500:{range:"$5,500 – $7,500",net:"$5,500 – $7,500",credit:false},"1500-2500":{range:"$6,500 – $9,000",net:"$6,500 – $9,000",credit:false},"2500-3500":{range:"$8,000 – $11,000",net:"$8,000 – $11,000",credit:false},o3500:{range:"$10,000 – $14,000",net:"$10,000 – $14,000",credit:false}},
  "assessment":{u1500:{range:"$4,000 – $12,000",net:"$4,000 – $12,000",credit:false},"1500-2500":{range:"$5,500 – $17,000",net:"$5,500 – $17,000",credit:false},"2500-3500":{range:"$7,000 – $22,000",net:"$7,000 – $22,000",credit:false},o3500:{range:"$10,000 – $24,000",net:"$10,000 – $24,000",credit:false}}
};

const systems={
  "ductless-single":{name:"Ductless Mini Split",fits:["No ductwork required","Heats AND cools year round","Quiet and efficient","Federal tax credit up to $2,000"]},
  "ductless-multi":{name:"Multi-Zone Ductless Heat Pump",fits:["No ductwork required","Whole-home coverage","Individual room control","Heats AND cools year round","Federal tax credit up to $2,000"]},
  "ducted-heat-pump":{name:"Ducted Heat Pump",fits:["Uses existing ductwork","Heats AND cools year round","More efficient than AC alone","Federal tax credit up to $2,000"]},
  "central-ac":{name:"Central AC",fits:["Uses existing ductwork","Whole-home cooling","Most affordable ducted option","Familiar system — easy to maintain"]},
  "assessment":{name:"Professional Assessment Recommended",fits:["Free estimate — no obligation","Same-day response available","Licensed and insured specialist","Will confirm best system on-site"]}
};

function getRecommendation(){
  const{ducts,zones,stories}=state;
  const noducts=ducts==="no",hasducts=ducts==="yes";
  const whole=zones==="whole",few=zones==="few",one=zones==="one";
  const multi=stories==="multi"||stories==="split";
  if(noducts){if(one)return"ductless-single";if(few&&!multi)return"ductless-single";return"ductless-multi";}
  if(hasducts){if(one||few)return"central-ac";return"ducted-heat-pump";}
  if(one)return"ductless-single";
  if(whole&&multi)return"ductless-multi";
  return"assessment";
}

function getWhy(k){
  const{stories,city,cooling}=state;
  const sm={single:"single-story",multi:"two-story",split:"split-level"};
  const cm={yes:"replacing an existing system",no:"adding cooling for the first time","not-sure":"exploring cooling options"};
  const w={
    "ductless-single":`No ductwork is needed — a single wall-mounted unit handles your zone efficiently. For a ${sm[stories]||""} home in ${city} ${cm[cooling]||""}, this is the most practical and cost-effective option.`,
    "ductless-multi":`Without ductwork, multiple wall-mounted units from one outdoor system give you whole-home coverage without major construction. Each room gets its own temperature control — the most efficient solution for ${city} homes.`,
    "ducted-heat-pump":`Your existing ductwork makes a ducted heat pump the smartest upgrade. It uses your current vents, heats and cools the whole home, and outperforms a standard AC unit for Pacific Northwest winters in ${city}.`,
    "central-ac":`Your existing ductwork makes central AC the most straightforward and cost-effective option for your ${city} home. Clean whole-home cooling without the complexity of a full heat pump system.`,
    "assessment":`Based on your answers, the best system depends on factors a specialist needs to confirm on-site in ${city} — ductwork condition, panel capacity, and home layout all affect the recommendation. A free estimate will narrow this down.`
  };
  return w[k]||"";
}

function clearErr(id){
  const el=document.getElementById(id);
  if(el)el.style.borderColor="var(--border)";
  const err=document.getElementById(id+"-err");
  if(err)err.textContent="";
}

function pickHomeType(val){
  if(!val)return;
  state.homeType=val;
  const labels={"single-family":"Single family home","condo":"Condo or apartment","townhouse":"Townhouse","multi-family":"Multi-family / duplex","mobile":"Mobile or manufactured home","other":"Other"};
  state.homeTypeLabel=labels[val]||val;
  const msg=document.getElementById("home-type-msg");
  if(msg){msg.textContent="✓ Got it";msg.style.color="#3B8A3E";}
  const btn=document.getElementById("next-1");
  if(btn)btn.disabled=false;
}

function startSelector(){
  const card=document.getElementById("calc-card");
  card.classList.add("active");
  card.scrollIntoView({behavior:"smooth",block:"start"});
}

function pick(el,step,val,label){
  el.closest(".options").querySelectorAll(".opt").forEach(o=>o.classList.remove("selected"));
  el.classList.add("selected");
  const m={2:["zones","zonesLabel"],3:["stories","storiesLabel"],4:["cooling","coolingLabel"],5:["size","sizeLabel"],6:["ducts","ductsLabel"]};
  if(m[step]){state[m[step][0]]=val;state[m[step][1]]=label;}
  const btn=document.getElementById("next-"+step);
  if(btn)btn.disabled=false;
}

function pickCity(val){
  if(!val)return;
  state.city=val;
  const msg=document.getElementById("city-msg");
  if(msg){msg.textContent="✓ Got it — pulling results for "+val;msg.style.color="#3B8A3E";}
  const btn=document.getElementById("next-7");
  if(btn)btn.disabled=false;
}

function goTo(n){
  document.querySelectorAll(".step-panel").forEach(p=>p.classList.remove("active"));
  for(let i=1;i<=7;i++){const s=document.getElementById("seg-"+i);if(s)s.className="prog-seg"+(i<n?" done":i===n?" active":"");}
  document.getElementById("prog-label").textContent="Question "+n+" of 7";
  const p=document.getElementById("step-"+n);
  if(p)p.classList.add("active");
}

function showLoading(){
  document.querySelectorAll(".step-panel").forEach(p=>p.classList.remove("active"));
  const loading=document.getElementById("loading");
  loading.classList.add("active");
  const bar=document.getElementById("bar-fill"),pct=document.getElementById("bar-pct");
  let progress=0;
  const timer=setInterval(()=>{
    progress=Math.min(progress+2.5,100);
    bar.style.width=progress+"%";
    pct.textContent=Math.round(progress)+"%";
    if(progress>=100){clearInterval(timer);setTimeout(()=>{loading.classList.remove("active");buildResult();},200);}
  },40);
}

function buildResult(){
  const recKey=getRecommendation();
  const sys=systems[recKey];
  const sm={single:"single-story",multi:"two-story",split:"split-level"};
  const dm={yes:"with existing ductwork",no:"without ductwork","not-sure":""};
  const cm={yes:"replacing an existing system",no:"adding cooling for the first time","not-sure":"exploring cooling options"};
  const zm={one:"cooling one room or zone",few:"cooling 2–3 rooms",whole:"cooling the whole home"};
  let intro=`Based on what you shared — a <strong>${sm[state.stories]||""} ${state.city}</strong> home ${dm[state.ducts]||""}, ${cm[state.cooling]||""}, ${zm[state.zones]||""} — here’s what we recommend:`;
  document.getElementById("result-intro").innerHTML=intro;
  document.getElementById("rec-system").textContent=sys.name;
  document.getElementById("rec-why").textContent=getWhy(recKey);
  const fitEl=document.getElementById("fit-list");
  fitEl.innerHTML=sys.fits.map(f=>`<div class="fit-item"><span class="fit-check">✓</span>${f}</div>`).join("");
  document.getElementById("cta-q").textContent="Want to see your instant estimate for "+state.city+" area homes?";
  for(let i=1;i<=7;i++){const s=document.getElementById("seg-"+i);if(s)s.className="prog-seg done";}
  document.getElementById("prog-label").textContent="Your recommendation";
  document.getElementById("result-panel").classList.add("active");
  document.querySelector(".calc-card").scrollIntoView({behavior:"smooth",block:"start"});
  gtag("event","selector_result_shown",{send_to:"AW-17039190320",recommendation:sys.name,city:state.city});
}

function showForm(){
  document.getElementById("cta-box").style.display="none";
  document.getElementById("form-section").classList.add("active");
}

function toggleSubmit(){
  document.getElementById("btn-submit").disabled=!document.getElementById("f-agree").checked;
}

async function submitForm(){
  let valid=true;
  ["f-name","f-email","f-phone","f-zip"].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.style.borderColor="var(--border)";
    const err=document.getElementById(id+"-err");
    if(err)err.textContent="";
  });
  const name=document.getElementById("f-name").value.trim();
  const email=document.getElementById("f-email").value.trim();
  const phone=document.getElementById("f-phone").value.trim();
  const zip=document.getElementById("f-zip").value.trim();
  const sanitize=s=>s.replace(/<[^>]*>/g,"").trim();
  const cleanName=sanitize(name),cleanEmail=sanitize(email),cleanPhone=sanitize(phone),cleanZip=sanitize(zip);
  if(!cleanName||cleanName.length<2||/[0-9]/.test(cleanName)){
    document.getElementById("f-name").style.borderColor="#E74C3C";
    document.getElementById("f-name-err").textContent="Please enter your first name (letters only, min 2 characters)";
    valid=false;
  }
  const emailRe=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if(!cleanEmail||!emailRe.test(cleanEmail)){
    document.getElementById("f-email").style.borderColor="#E74C3C";
    document.getElementById("f-email-err").textContent="Please enter a valid email address";
    valid=false;
  }
  const phoneDigits=cleanPhone.replace(/\D/g,"");
  if(phoneDigits.length<10){
    document.getElementById("f-phone").style.borderColor="#E74C3C";
    document.getElementById("f-phone-err").textContent="Please enter a valid 10-digit phone number";
    valid=false;
  }
  const zipClean=cleanZip.replace(/\D/g,"");
  if(zipClean.length!==5||!zipClean.startsWith("98")){
    document.getElementById("f-zip").style.borderColor="#E74C3C";
    document.getElementById("f-zip-err").textContent="Please enter a valid Snohomish County zip code (starts with 98)";
    valid=false;
  }
  if(document.getElementById("h-pot").value!=="")return;
  if(!valid)return;
  const recKey=getRecommendation();
  const sys=systems[recKey];
  const priceData=pricing[recKey][state.size]||pricing[recKey]["1500-2500"];
  const btn=document.getElementById("btn-submit");
  btn.textContent="Getting your estimate...";
  btn.disabled=true;
  const payload={lead_type:"hot",source:"ac-selector",timestamp:new Date().toISOString(),home_type:state.homeTypeLabel,recommendation:sys.name,zones:state.zonesLabel,stories:state.storiesLabel,existing_cooling:state.coolingLabel,size:state.sizeLabel,ducts:state.ductsLabel,city:state.city,estimate_range:priceData.range,net_estimate:priceData.net,name:cleanName,email:cleanEmail,phone:cleanPhone,zip:cleanZip};
  try{await fetch(WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});}catch(e){}
  document.getElementById("form-section").classList.remove("active");
  revealPrice(recKey,priceData);
  gtag("event","conversion",{send_to:"AW-17039190320/-qj3CP3-j48cELDS9bw_"});
}

function revealPrice(recKey,priceData){
  const heatPump=recKey==="ducted-heat-pump"||recKey==="ductless-single"||recKey==="ductless-multi";
  document.getElementById("reveal-eyebrow").textContent=systems[recKey].name+" — "+state.city+" 2026";
  const confirmEl=document.getElementById("reveal-confirm");
  if(confirmEl)confirmEl.textContent=systems[recKey].name+" for a "+state.sizeLabel+" home in "+state.city+".";
  document.getElementById("reveal-range").textContent=priceData.range;
  document.getElementById("reveal-note").textContent="Based on recent installations in Greater Snohomish County — 2026 pricing.";
  if(!heatPump){const fr=document.getElementById("federal-row");if(fr)fr.style.display="none";}
  document.getElementById("net-range").textContent=priceData.net;
  document.getElementById("net-note").textContent=heatPump?"After federal tax credit (up to $2,000) — ask about additional utility rebates.":"Ask your installer about available incentives and financing options.";
  document.getElementById("price-reveal").classList.add("active");
  document.getElementById("price-reveal").scrollIntoView({behavior:"smooth",block:"start"});
}

function showNotYet(){
  document.getElementById("cta-box").style.display="none";
  document.getElementById("not-yet").classList.add("active");
}

function restartCalc(){
  Object.keys(state).forEach(k=>state[k]=null);
  document.querySelectorAll(".opt").forEach(o=>o.classList.remove("selected"));
  const cs=document.getElementById("city-select");if(cs)cs.value="";
  const cm=document.getElementById("city-msg");if(cm)cm.textContent="";
  const hs=document.getElementById("home-type-select");if(hs)hs.value="";
  const hm=document.getElementById("home-type-msg");if(hm)hm.textContent="";
  for(let i=1;i<=7;i++){const n=document.getElementById("next-"+i);if(n)n.disabled=true;}
  document.getElementById("result-panel").classList.remove("active");
  document.getElementById("form-section").classList.remove("active");
  document.getElementById("price-reveal").classList.remove("active");
  document.getElementById("not-yet").classList.remove("active");
  document.getElementById("cta-box").style.display="block";
  const bs=document.getElementById("btn-submit");
  if(bs){bs.textContent="Get My Instant Estimate →";bs.disabled=true;}
  const fa=document.getElementById("f-agree");if(fa)fa.checked=false;
  goTo(1);
  const s1=document.getElementById("step-1");if(s1)s1.classList.add("active");
}

function toggleFaq(btn){
  const a=btn.nextElementSibling;
  const open=btn.classList.contains("open");
  document.querySelectorAll(".faq-q").forEach(b=>{b.classList.remove("open");b.nextElementSibling.classList.remove("open");});
  if(!open){btn.classList.add("open");a.classList.add("open");}
}
</script>

</body>
</html>
